services:
  navidrome:
    image: deluan/navidrome:latest
    user: 1000:1000
    ports:
      - "${NAVIDROME_HOST_PORT:-4533}:4533"
    restart: unless-stopped
    environment:
      - ND_CONFIGFILE=/data/navidrome.toml
      - ND_PASSWORDENCRYPTIONKEY=${ND_PASSWORDENCRYPTIONKEY}
      - ND_LASTFM_APIKEY=${ND_LASTFM_APIKEY}
      - ND_LASTFM_SECRET=${ND_LASTFM_SECRET}
      - ND_PROMETHEUS_PASSWORD=${ND_PROMETHEUS_PASSWORD}
      - ND_TLSCERT=${ND_TLSCERT}
      - ND_TLSKEY=${ND_TLSKEY}
    volumes:
      - "./data:/data"
      - "./logs:/logs"
      - "./backups:/backups"
      - "./media:/media:ro"
      - "${NAVIDROME_MUSIC_PATH}:/music:ro"
